name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths-ignore:
      - 'docs/**'
      - '*.md'

jobs:
  deploy:
    runs-on: [self-hosted, linux, nexo-test]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Health check
        run: |
          echo "✅ Build OK"
          node -e "console.log('✅ Node.js ' + process.version)"
