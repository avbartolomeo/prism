# Prism — MCP Context Router configuration
# Copy this to prism.toml and adjust to your setup.

[budget]
max_tokens = 8000  # Max tokens for tool descriptions in context

[dashboard]
port = 3002  # Web UI at http://localhost:3002

[traces]
path = "./prism-traces.db"  # SQLite path for trace storage

# --- MCP Servers ---
# Add your servers below. Each server is spawned as a child process.

[[servers]]
name = "filesystem"
command = "npx"
args = ["@modelcontextprotocol/server-filesystem", "/home/user"]

[[servers]]
name = "github"
command = "npx"
args = ["@modelcontextprotocol/server-github"]
env = { GITHUB_TOKEN = "ghp_..." }

